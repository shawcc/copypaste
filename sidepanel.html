<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="sidepanel.css" />
    <title>文案大师·傅</title>
  </head>
  <body>
    <main class="wrap">
      <header class="top">
        <div class="title">文案大师·傅</div>
      </header>

      <section class="card">
        <div class="row" style="margin-bottom: 12px;">
          <label class="label" for="modeSelect">提取模式</label>
          <select id="modeSelect" class="select">
            <option value="image_first">模式1: 以图找文 (据图OCR匹配文案)</option>
            <option value="text_first">模式2: 以文找图 (据文案特征匹配图)</option>
          </select>
        </div>
        
        <!-- 新增特征过滤器 UI (仅在模式2显示) -->
        <div id="featureFilter" class="feature-filter" style="display: none;">
          <div class="row">
            <label class="label" for="featureType" style="width: 70px;">选择特征</label>
            <select id="featureType" class="select" style="flex: 1;">
              <option value="fontColor">字体颜色</option>
              <option value="specialStyle">特殊样式</option>
            </select>
          </div>
          <div id="featureOptions" class="feature-options"></div>
        </div>

        <button id="clipboardExtractBtn" class="btn primary">第一步：从剪贴板提取 (推荐)</button>
        <button id="copyBtn" class="btn primary" disabled>第二步：复制为表格（可粘贴到飞书）</button>
        <button id="resetBtn" class="btn danger">重置清空</button>
        <div id="status" class="status"></div>
        
        <div class="tip" style="background: #eef2ff; border-left: 4px solid #4f46e5; padding: 12px; margin-top: 16px; border-radius: 4px;">
          <strong style="color: #4f46e5; display: block; margin-bottom: 6px;">💡 使用说明：</strong>
          1. 在左侧文档中框选你需要的内容。<br/>
          2. 按下 <b>Command+C</b> (或 Ctrl+C) 复制。<br/>
          3. 点击上方的 <b>“第一步：从剪贴板提取”</b> 按钮。
        </div>
      </section>

      <section class="card">
        <div class="meta">
          <div><span class="k">文案</span> <span id="lineCount">0</span></div>
          <div><span class="k">图片</span> <span id="imageCount">0</span></div>
        </div>
        <ol id="preview" class="preview"></ol>
        <div id="imagePreview" class="image-preview"></div>
      </section>
    </main>

    <!-- Quiz Overlay -->
    <div id="quizOverlay" class="quiz-overlay" style="display: none;">
      <div class="quiz-card">
        <h3 id="quizTitle">使用前验证 (防滥用)</h3>
        <p id="quizDesc" style="font-size: 12px; color: #6b7280; margin-bottom: 12px;">回答正确后才能使用提取功能。10分钟内最多3次机会。</p>
        <div id="quizQuestion" style="font-size: 14px; font-weight: 500; margin-bottom: 12px; line-height: 1.4;"></div>
        <div id="quizOptions" class="quiz-options"></div>
        <button id="quizSubmitBtn" class="btn primary" style="margin-top: 12px;" disabled>提交答案</button>
        <div id="quizStatus" class="status" style="margin-top: 8px;"></div>
      </div>
    </div>

    <script src="exporter.js"></script>
    <!-- 移除 Tesseract，换用通过 API 接口的 OCR 或更现代的方案。为了最快见效且无需下载几十MB的Wasm，我们这里使用免费的云端/轻量级 API 兜底，或告知用户需要时间加载 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
